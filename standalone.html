<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财梯 - 季度滚动阶梯式存款规划</title>
    <style>
        :root {
            --primary-color: #07C160;
            --secondary-color: #2B3137;
            --accent-color: #FF9F43;
            --background-color: #F6F7F9;
            --card-background: #FFFFFF;
            --text-primary: #2B3137;
            --text-secondary: #8a8a8a;
            --text-tertiary: #b0b0b0;
            --border-color: #e5e5e5;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background-color);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Helvetica, Segoe UI, Arial, Roboto, 'Hiragino Sans GB', 'Microsoft Yahei', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }

        .header-section {
            text-align: center;
            padding: 32px 0 24px;
        }

        .app-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .app-subtitle {
            font-size: 18px;
            font-weight: 500;
            color: var(--secondary-color);
            margin-bottom: 8px;
        }

        .app-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .card {
            background: var(--card-background);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 16px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: block;
        }

        .input-field {
            width: 100%;
            height: 44px;
            background: var(--background-color);
            border-radius: 8px;
            padding: 0 16px;
            font-size: 16px;
            border: 2px solid transparent;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--primary-color);
        }

        .amount-input-wrap {
            position: relative;
        }

        .amount-input-wrap .currency {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-secondary);
        }

        .amount-input-wrap input {
            padding-left: 32px;
        }

        .expense-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .expense-label {
            font-size: 14px;
            color: var(--text-primary);
        }

        .expense-input {
            width: 140px;
        }

        .horizon-selector {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .horizon-option {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            background: var(--background-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .horizon-option.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--primary-color);
            color: #ffffff;
            border-radius: 8px;
            padding: 14px 0;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            border: none;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .expense-summary {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            background: var(--background-color);
            border-radius: 8px;
            padding: 20px;
        }

        .summary-item {
            text-align: center;
            flex: 1;
        }

        .summary-item:not(:last-child) {
            border-right: 1px solid var(--border-color);
        }

        .summary-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .summary-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
            font-family: 'DIN Alternate', 'Roboto Mono', monospace;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            display: none;
        }

        .tips-section {
            padding: 16px 0;
        }

        .tip-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            padding: 12px 16px;
            background: rgba(12, 193, 96, 0.05);
            border-radius: 6px;
        }

        .tip-icon {
            font-size: 16px;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .tip-text {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header-section">
            <h1 class="app-title">财梯</h1>
            <p class="app-subtitle">季度滚动阶梯式存款规划</p>
            <p class="app-desc">智能分配存款，确保每个季度初资金准时到位</p>
        </div>

        <!-- Input Form Card -->
        <div class="card">
            <div class="section-title">基础数据</div>

            <!-- Total Cash -->
            <div class="input-group">
                <label class="input-label">总存款金额（元）</label>
                <div class="amount-input-wrap">
                    <span class="currency">¥</span>
                    <input type="text" id="totalCash" class="input-field" placeholder="请输入总存款金额" />
                </div>
            </div>

            <!-- Monthly Expenses -->
            <div class="expense-section">
                <div class="input-label">月度支出明细</div>

                <div class="expense-item">
                    <span class="expense-label">房屋支出</span>
                    <div class="amount-input-wrap expense-input">
                        <span class="currency">¥</span>
                        <input type="text" id="housingExpense" class="input-field" placeholder="1500" />
                    </div>
                </div>

                <div class="expense-item">
                    <span class="expense-label">餐饮支出</span>
                    <div class="amount-input-wrap expense-input">
                        <span class="currency">¥</span>
                        <input type="text" id="foodExpense" class="input-field" placeholder="2000" />
                    </div>
                </div>

                <div class="expense-item">
                    <span class="expense-label">其他支出</span>
                    <div class="amount-input-wrap expense-input">
                        <span class="currency">¥</span>
                        <input type="text" id="otherExpense" class="input-field" placeholder="1000" />
                    </div>
                </div>
            </div>

            <!-- Emergency Fund -->
            <div class="input-group" style="margin-top: 24px;">
                <label class="input-label">应急金（元）</label>
                <div class="amount-input-wrap">
                    <span class="currency">¥</span>
                    <input type="text" id="emergencyFund" class="input-field" placeholder="建议：5000" />
                </div>
                <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 6px;">应急金将永久保留在活期，不参与滚动</div>
            </div>

            <!-- Planning Horizon -->
            <div class="input-group" style="margin-top: 24px;">
                <label class="input-label">规划区间</label>
                <div class="horizon-selector">
                    <div class="horizon-option active" data-value="1">1 年</div>
                    <div class="horizon-option" data-value="3">3 年</div>
                    <div class="horizon-option" data-value="5">5 年</div>
                    <div class="horizon-option" data-value="10">10 年</div>
                </div>
                <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 6px;">选择滚动周期长度，到期自动续存</div>
            </div>

            <!-- Expense Summary -->
            <div id="expenseSummary" class="expense-summary" style="display: none;">
                <div class="summary-item">
                    <div class="summary-label">月度支出</div>
                    <div class="summary-value" id="monthlyExpense">¥0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">季度支出</div>
                    <div class="summary-value" id="quarterlyExpense">¥0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">年度支出</div>
                    <div class="summary-value" id="annualExpense">¥0</div>
                </div>
            </div>
        </div>

        <!-- Generate Button -->
        <div class="action-section">
            <button class="btn-primary" onclick="generatePlan()">生成存款计划</button>
        </div>

        <!-- Tips -->
        <div class="tips-section">
            <div class="tip-item">
                <span class="tip-icon">💡</span>
                <span class="tip-text">每个季度首日（1 月 1 日、4 月 1 日、7 月 1 日、10 月 1 日）资金 100% 到位</span>
            </div>
            <div class="tip-item">
                <span class="tip-icon">💰</span>
                <span class="tip-text">短期资金使用定期存款，利率高于活期</span>
            </div>
            <div class="tip-item">
                <span class="tip-icon">🔒</span>
                <span class="tip-text">长期资金存入 3 年定期，享受最高利率</span>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // State
        let planningHorizon = '1';
        let monthlyExpense = 0;

        // Horizon selector
        document.querySelectorAll('.horizon-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.horizon-option').forEach(o => o.classList.remove('active'));
                option.classList.add('active');
                planningHorizon = option.dataset.value;
            });
        });

        // Calculate expenses
        function calculateExpenses() {
            const housing = parseFloat(document.getElementById('housingExpense').value) || 0;
            const food = parseFloat(document.getElementById('foodExpense').value) || 0;
            const other = parseFloat(document.getElementById('otherExpense').value) || 0;

            monthlyExpense = housing + food + other;
            const quarterly = monthlyExpense * 3;
            const annual = monthlyExpense * 12;

            if (monthlyExpense > 0) {
                document.getElementById('expenseSummary').style.display = 'flex';
                document.getElementById('monthlyExpense').textContent = '¥' + monthlyExpense.toFixed(2);
                document.getElementById('quarterlyExpense').textContent = '¥' + quarterly.toFixed(2);
                document.getElementById('annualExpense').textContent = '¥' + annual.toFixed(2);
            } else {
                document.getElementById('expenseSummary').style.display = 'none';
            }
        }

        // Add event listeners
        ['housingExpense', 'foodExpense', 'otherExpense'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateExpenses);
        });

        // Show toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        // Generate plan
        function generatePlan() {
            const totalCash = parseFloat(document.getElementById('totalCash').value);

            if (!totalCash || totalCash <= 0) {
                showToast('请输入有效存款金额');
                return;
            }

            if (monthlyExpense <= 0) {
                showToast('请输入月支出金额（房租 + 伙食 + 其他）');
                return;
            }

            showToast('✓ 计划生成中...');

            // TODO: Implement full plan generation logic
            setTimeout(() => {
                showToast('✓ 计划已生成（功能开发中）');
            }, 1000);
        }
    </script>
</body>
</html>
